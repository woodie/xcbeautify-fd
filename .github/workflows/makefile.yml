name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    # xctidy parses xcodebuild's own output, so it only ever runs against a
    # real Xcode/macOS build -- see docs/HOW_IT_WORKS.md's "no Linux
    # support" note. macos-latest ships Xcode + Swift preinstalled already.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: make build

      - name: Test
        run: make test
